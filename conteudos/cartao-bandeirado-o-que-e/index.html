{"@type":"ImageObject","url":"https://wearejust.it/logo-just.png"}},"articleSection":"Meios de pagamento","keywords":"cartão-bandeirado, bandeiras, Visa, Mastercard, Elo, arranjo-aberto, BaaS","abstract":"Cartão bandeirado é o cartão que carrega uma bandeira como Visa, Mastercard, Elo ou Amex e trafega em um arranjo de pagamento aberto. A bandeira não é o banco emissor: ela conecta emissor, adquirente e estabelecimento para permitir aceitação ampla.","isAccessibleForFree":true,"citation":["https://www.planalto.gov.br/ccivil_03/_ato2011-2014/2013/lei/l12865.htm","https://www.bcb.gov.br/estabilidadefinanceira/arranjosintegrantesspb","https://www.bcb.gov.br/meubc/faqs/s/arranjo-de-pagamentos"]},{"@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://wearejust.it/"},{"@type":"ListItem","position":2,"name":"Conteúdos","item":"https://wearejust.it/conteudos/"},{"@type":"ListItem","position":3,"name":"Meios de pagamento","item":"https://wearejust.it/conteudos/categoria/meios-de-pagamento/"},{"@type":"ListItem","position":4,"name":"Cartão bandeirado: o que é, como funciona e quais existem no Brasil","item":"https://wearejust.it/conteudos/cartao-bandeirado-o-que-e/"}]},{"@type":"Person","@id":"https://wearejust.it/autores/gabriel-pires/#person","name":"Gabriel Pires","jobTitle":"Founder & CEO da JUST","description":"Especialista em produtos financeiros digitais, meios de pagamento e plataformas financeiras modulares.","image":"https://wearejust.it/authors/gabriel-pires.jpeg","sameAs":["https://www.linkedin.com/in/gabrielfzp/"]},{"@type":"FAQPage","mainEntity":[{"@type":"Question","name":"O que significa cartão bandeirado?","acceptedAnswer":{"@type":"Answer","text":"É um cartão que carrega o logo de uma bandeira, como Visa, Mastercard, Elo, Amex, Hipercard ou Cabal, e trafega pelo arranjo de pagamento aberto dessa bandeira. A bandeira conecta o banco emissor e o adquirente que atende o estabelecimento, permitindo aceitação ampla."}},{"@type":"Question","name":"Qual a diferença entre bandeira e banco emissor?","acceptedAnswer":{"@type":"Answer","text":"Bandeira é a rede, como Visa ou Mastercard. Banco emissor é quem deu o cartão e cobra do portador, como Itaú ou Nubank. No mesmo cartão aparecem os dois nomes porque são papéis diferentes: o emissor dá o crédito e o plástico, a bandeira garante o trilho de aceitação."}},{"@type":"Question","name":"Quais são as principais bandeiras no Brasil?","acceptedAnswer":{"@type":"Answer","text":"Visa e Mastercard lideram em aceitação global e nacional. Elo é a principal bandeira brasileira, resultado de joint venture entre Banco do Brasil, Bradesco e Caixa. Hipercard é do Itaú. American Express atende nicho premium. Cabal atua no cooperativismo de crédito."}},{"@type":"Question","name":"Todo cartão de crédito é bandeirado?","acceptedAnswer":{"@type":"Answer","text":"Não. Existem cartões de crédito sem bandeira, chamados private label, que funcionam só na rede do emissor, como Pernambucanas, Renner e Riachuelo. São cartões de crédito operados em arranjo fechado, sob a Lei 12.865/2013, mas sem Visa ou Mastercard envolvidas."}},{"@type":"Question","name":"É possível emitir cartão sem bandeira?","acceptedAnswer":{"@type":"Answer","text":"Sim. O private label é exatamente isso: cartão sem bandeira, aceito só na rede do próprio emissor, sem fees de bandeira e sem MDR em transações internas. Em troca, a aceitação é restrita. Para programas de fidelização de base engajada, costuma ser vantajoso."}},{"@type":"Question","name":"Quanto custa para uma empresa licenciar uma bandeira?","acceptedAnswer":{"@type":"Answer","text":"Varia por bandeira, categoria e volume esperado. Há fees iniciais de certificação e fees recorrentes por cartão ativo e por transação. Empresas não-bancárias normalmente acessam bandeira via BaaS licenciada em vez de contratar direto com a bandeira."}},{"@type":"Question","name":"Como uma fintech consegue emitir cartão bandeirado?","acceptedAnswer":{"@type":"Answer","text":"Há dois caminhos. O primeiro é virar IP autorizada pelo BACEN e licenciar a bandeira diretamente, processo que leva meses e custa centenas de milhares de reais. O segundo, mais comum, é contratar uma BaaS que já é emissora e licenciada."}},{"@type":"Question","name":"Cartão bandeirado é o mesmo que cartão de crédito?","acceptedAnswer":{"@type":"Answer","text":"Não. Bandeirado significa que o cartão tem bandeira e trafega em arranjo aberto, mas ele pode ser de crédito, débito, pré-pago ou múltiplos saldos. O mais comum no imaginário popular é o crédito bandeirado, mas a lógica do arranjo aberto vale para todas as funções."}}]}]}</script>
