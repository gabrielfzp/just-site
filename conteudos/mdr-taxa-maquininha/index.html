nça entre MDR e intercâmbio?","acceptedAnswer":{"@type":"Answer","text":"O MDR é a taxa total que o estabelecimento paga. O intercâmbio é a fatia do MDR que vai para o emissor do cartão. O MDR também inclui a tarifa da bandeira e a margem do adquirente. Intercâmbio costuma ser 60% a 70% do MDR total."}},{"@type":"Question","name":"Quem define o valor do MDR?","acceptedAnswer":{"@type":"Answer","text":"O valor do MDR é negociado entre o adquirente (dono da maquininha) e o estabelecimento. Como intercâmbio e tarifa de bandeira são fixados por tabelas, a negociação acontece na margem do adquirente. Lojistas grandes conseguem MDR muito menor que pequenos comerciantes."}},{"@type":"Question","name":"O MDR é o mesmo para crédito e débito?","acceptedAnswer":{"@type":"Answer","text":"Não. Em crédito, o MDR é maior porque o emissor assume risco e o adquirente antecipa pagamento em 28 dias. Em débito, o MDR é menor porque a liquidação é mais rápida e o teto de intercâmbio do BACEN é mais baixo."}},{"@type":"Question","name":"Pix tem MDR?","acceptedAnswer":{"@type":"Answer","text":"Não no formato tradicional. Pix direto entre pessoas físicas é gratuito. Pix entre pessoa jurídica e pessoa física pode ter tarifa negociada com o banco ou instituição de pagamento. Os meios de pagamento baseados em Pix (como Pix garantido e Pix automático) podem ter tarifas variáveis. Em média, bem abaixo do MDR de cartão."}}]}]}</script>
