ansações no sistema global de pagamentos."}},{"@type":"Question","name":"Qual é a diferença entre BIN e IIN?","acceptedAnswer":{"@type":"Answer","text":"BIN é o termo histórico. IIN (Issuer Identification Number) é o termo moderno e oficial da norma ISO/IEC 7812-1. Ambos se referem ao mesmo conjunto de dígitos. Hoje é uma terminologia dupla, com IIN sendo tecnicamente correto e BIN sendo comum no dia a dia."}},{"@type":"Question","name":"Quanto custa solicitar um BIN no Brasil?","acceptedAnswer":{"@type":"Answer","text":"O custo direto na ABNT fica entre R$ 3.000 e R$ 5.000 por IIN. Incluindo homologação em bandeira, integração técnica e setup operacional, o custo total para ter um BIN funcional vai de R$ 170 mil a R$ 830 mil."}},{"@type":"Question","name":"Quanto tempo leva para receber um BIN?","acceptedAnswer":{"@type":"Answer","text":"O processo na ABNT leva em torno de 30 dias corridos. Considerando homologação em bandeira e integração, pode levar de 3 a 6 meses no total até o primeiro cartão em produção."}},{"@type":"Question","name":"Preciso de BIN próprio para emitir cartão?","acceptedAnswer":{"@type":"Answer","text":"Não necessariamente. Se você opera via BIN Sponsor em bandeira aberta, usa o BIN do sponsor. Só precisa de BIN próprio se quer emitir cartão com arranjo fechado próprio, se quer ser emissor direto em bandeira aberta, ou se tem arranjo proprietário que interopera com outros."}}]}]}</script>
